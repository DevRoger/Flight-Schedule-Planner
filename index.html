<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AeroSchedule Pro - Flight Planner</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="top-bar">
      <div class="top-bar-start">
        <span class="material-icons app-logo" style="color: var(--primary)"
          >flight_takeoff</span
        >
        <h1 class="app-title">AeroSchedule</h1>
      </div>
      <div class="top-bar-end">
        <div class="theme-switch-wrapper">
          <span class="material-icons theme-icon">light_mode</span>
          <label class="switch">
            <input type="checkbox" id="themeToggle" onchange="toggleTheme()" />
            <span class="slider"></span>
          </label>
          <span class="material-icons theme-icon">dark_mode</span>
        </div>
      </div>
    </header>

    <div class="controls card">
      <div class="control-group">
        <label>Nuevo Stand (Avión)</label>
        <div style="display: flex; gap: 5px">
          <input
            type="text"
            id="newStandName"
            placeholder="Nombre (Ej. BCN-737)"
          />
          <input
            type="color"
            id="standColor"
            value="#e8f0fe"
            title="Color del Stand"
          />
        </div>
        <button onclick="addStand()" class="btn-primary">Añadir</button>
      </div>

      <div class="divider"></div>

      <div class="control-group">
        <label>ID, Ruta y Color</label>
        <div style="display: flex; gap: 5px">
          <div style="position: relative; width: 90px">
            <input
              type="text"
              id="flightId"
              placeholder="Ej: IB123"
              style="width: 100%"
              oninput="showSuggestions(this.value)"
              autocomplete="off"
            />
            <div id="routeSuggestions" class="suggestions-container"></div>
          </div>
          <select id="origin"></select>
          <select id="destination"></select>
          <input
            type="color"
            id="flightColor"
            value="#1a73e8"
            title="Color del Vuelo"
          />
        </div>
      </div>

      <div class="control-group">
        <label>Salida</label>
        <div style="display: flex; gap: 5px">
          <input type="date" id="depDate" />
          <input type="time" id="depTime" />
        </div>
      </div>

      <div class="control-group">
        <label>Llegada</label>
        <div style="display: flex; gap: 5px">
          <input type="date" id="arrDate" />
          <input type="time" id="arrTime" />
        </div>
      </div>

      <div class="control-group">
        <label>Asignación</label>
        <div style="display: flex; gap: 10px">
          <select id="standSelect" style="flex: 1"></select>
          <button onclick="addFlight()" class="btn-success">
            Programar Vuelo
          </button>
        </div>
      </div>
    </div>

    <div class="timeline-controls card">
      <button onclick="changeViewDay(-1)" class="btn-icon">
        ◀ Día Anterior
      </button>
      <input
        type="date"
        id="currentViewDate"
        onchange="renderTimeline()"
        class="date-display"
      />
      <button onclick="changeViewDay(1)" class="btn-icon">
        Día Siguiente ▶
      </button>
    </div>

    <div class="planner-wrapper card">
      <div class="sidebar" id="sidebar"></div>

      <div class="timeline-container">
        <div id="timelineScrollArea" class="timeline-scroll">
          <div class="time-header" id="timeHeader"></div>
          <div id="rowsContainer"></div>
        </div>
      </div>
    </div>

    <div class="overlay" id="drawerOverlay" onclick="closeAllDrawers()"></div>

    <div class="side-drawer" id="editDrawer">
      <div class="drawer-header">
        <h3>Editar Vuelo</h3>
        <button
          class="btn-icon"
          onclick="closeAllDrawers()"
          style="border: none"
        >
          ✕
        </button>
      </div>
      <div class="drawer-content">
        <input type="hidden" id="editFlightInternalId" />

        <div class="control-group">
          <label>ID y Color</label>
          <div style="display: flex; gap: 10px">
            <input type="text" id="editFlightId" style="flex: 1" />
            <input type="color" id="editFlightColor" style="width: 50px" />
          </div>
        </div>
        <div class="control-group">
          <label>Ruta</label>
          <div style="display: flex; gap: 10px">
            <select id="editOrigin" style="flex: 1"></select>
            <span style="align-self: center">→</span>
            <select id="editDestination" style="flex: 1"></select>
          </div>
        </div>
        <div class="control-group">
          <label>Salida</label>
          <div style="display: flex; gap: 10px">
            <input type="date" id="editDepDate" style="flex: 1" />
            <input type="time" id="editDepTime" style="flex: 1" />
          </div>
        </div>
        <div class="control-group">
          <label>Llegada</label>
          <div style="display: flex; gap: 10px">
            <input type="date" id="editArrDate" style="flex: 1" />
            <input type="time" id="editArrTime" style="flex: 1" />
          </div>
        </div>
        <div class="control-group">
          <label>Stand Asignado</label>
          <select id="editStandSelect"></select>
        </div>
      </div>
      <div class="drawer-footer">
        <button
          class="btn-icon"
          onclick="closeAllDrawers()"
          style="border: none"
        >
          Cancelar
        </button>
        <button class="btn-primary" onclick="saveFlightEdit()">
          Guardar Cambios
        </button>
      </div>
    </div>

    <div class="side-drawer" id="editStandDrawer">
      <div class="drawer-header">
        <h3>Editar Stand</h3>
        <button
          class="btn-icon"
          onclick="closeAllDrawers()"
          style="border: none"
        >
          ✕
        </button>
      </div>
      <div class="drawer-content">
        <input type="hidden" id="editStandInternalId" />

        <div class="control-group">
          <label>Nombre del Stand (Avión)</label>
          <input type="text" id="editStandName" />
        </div>
        <div class="control-group">
          <label>Color</label>
          <input type="color" id="editStandColor" style="width: 50px" />
        </div>
      </div>
      <div class="drawer-footer">
        <button
          class="btn-icon"
          onclick="closeAllDrawers()"
          style="border: none"
        >
          Cancelar
        </button>
        <button class="btn-primary" onclick="saveStandEdit()">
          Guardar Cambios
        </button>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
  </body>
</html>
