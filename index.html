<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AeroSchedule Pro - Flight Planner</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="nav-overlay" id="navOverlay" onclick="closeNav()"></div>
    <nav class="nav-drawer" id="mainNav">
      <div class="nav-header">
        <span class="material-icons app-logo" style="color: var(--primary)"
          >flight_takeoff</span
        >
        <h2>AeroSchedule</h2>
      </div>
      <div class="nav-links">
        <a href="index.html" class="nav-link active">
          <span class="material-icons">dashboard</span> Inicio / Planner
        </a>
        <a href="data.html" class="nav-link">
          <span class="material-icons">storage</span> Gestión de Datos
        </a>
      </div>
    </nav>

    <header class="top-bar">
      <div class="top-bar-start">
        <span
          class="material-icons menu-icon"
          onclick="openNav()"
          style="cursor: pointer; margin-right: 12px; color: var(--text-sec)"
          >menu</span
        >
        <span class="material-icons app-logo" style="color: var(--primary)"
          >flight_takeoff</span
        >
        <h1 class="app-title">AeroSchedule</h1>
      </div>
      <div class="top-bar-end">
        <div class="theme-switch-wrapper">
          <span class="material-icons theme-icon">light_mode</span>
          <label class="switch">
            <input type="checkbox" id="themeToggle" onchange="toggleTheme()" />
            <span class="slider"></span>
          </label>
          <span class="material-icons theme-icon">dark_mode</span>
        </div>
      </div>
    </header>

    <div
      class="controls card"
      style="padding: 0; flex-direction: column; align-items: stretch"
    >
      <div class="event-tabs">
        <button
          class="tab-btn active"
          id="tab-flight"
          onclick="setEventType('flight')"
        >
          <span class="material-icons" style="font-size: 18px">flight</span>
          Vuelo Comercial
        </button>
        <button
          class="tab-btn"
          id="tab-maintenance"
          onclick="setEventType('maintenance')"
        >
          <span class="material-icons" style="font-size: 18px">build</span>
          Mantenimiento
        </button>
        <button
          class="tab-btn"
          id="tab-backup"
          onclick="setEventType('backup')"
        >
          <span class="material-icons" style="font-size: 18px">security</span>
          Backup / Reserva
        </button>
      </div>

      <div
        style="
          padding: 20px 24px;
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
          gap: 24px;
          align-items: flex-end;
        "
      >
        <div
          class="control-group"
          style="
            border-right: 1px solid var(--border-light);
            padding-right: 24px;
          "
        >
          <label>Nuevo Stand (Avión)</label>
          <div style="display: flex; gap: 5px">
            <input
              type="text"
              id="newStandName"
              placeholder="Nombre (Ej. BCN-737)"
              style="width: 140px"
            />
            <input
              type="color"
              id="standColor"
              value="#e8f0fe"
              title="Color del Stand"
            />
          </div>
          <button
            onclick="addStand()"
            class="btn-primary"
            style="margin-top: 8px; width: 100%"
          >
            Añadir Stand
          </button>
        </div>

        <div class="control-group">
          <label id="idLabel">ID, Ruta y Color</label>
          <div style="display: flex; gap: 5px">
            <div
              id="idInputWrapper"
              style="
                position: relative;
                width: 120px;
                transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
              "
            >
              <input
                type="text"
                id="flightId"
                placeholder="Ej: IB123"
                style="width: 100%"
                oninput="showSuggestions(this.value)"
                autocomplete="off"
              />
              <div id="routeSuggestions" class="suggestions-container"></div>
            </div>

            <div id="routeContainer" style="display: flex; gap: 5px">
              <select id="origin"></select>
              <select id="destination"></select>
            </div>

            <input
              type="color"
              id="flightColor"
              value="#0b57d0"
              title="Color del Evento"
            />
          </div>
        </div>

        <div class="control-group">
          <label>Inicio</label>
          <div style="display: flex; gap: 5px">
            <input type="date" id="depDate" />
            <input type="time" id="depTime" />
          </div>
        </div>

        <div class="control-group">
          <label>Fin</label>
          <div style="display: flex; gap: 5px">
            <input type="date" id="arrDate" />
            <input type="time" id="arrTime" />
          </div>
        </div>

        <div class="control-group">
          <label>Asignación</label>
          <div style="display: flex; gap: 10px">
            <select id="standSelect" style="flex: 1"></select>
            <button
              onclick="addFlight()"
              class="btn-success"
              id="submitBtnText"
            >
              Programar
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      class="timeline-controls card"
      style="justify-content: space-between; padding: 10px 24px"
    >
      <div style="flex: 1; display: flex; align-items: center; gap: 10px">
        <span
          class="material-icons"
          style="color: var(--text-sec); font-size: 20px"
          >calendar_month</span
        >
        <select
          id="timeScale"
          onchange="renderTimeline()"
          style="
            height: 36px;
            border-radius: 18px;
            border: 1px solid var(--border-light);
            background: var(--background);
            padding: 0 16px;
            color: var(--text-main);
            cursor: pointer;
            outline: none;
            font-weight: 500;
          "
        >
          <option value="day">Vista Diaria</option>
          <option value="week">Vista Semanal</option>
          <option value="month">Vista Mensual</option>
        </select>
      </div>

      <div
        style="
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 15px;
          flex: 1;
        "
      >
        <button onclick="changeViewDay(-1)" class="btn-icon">◀ Anterior</button>
        <input
          type="date"
          id="currentViewDate"
          onchange="renderTimeline()"
          class="date-display"
        />
        <button onclick="changeViewDay(1)" class="btn-icon">Siguiente ▶</button>
      </div>

      <div
        style="
          display: flex;
          align-items: center;
          justify-content: flex-end;
          gap: 12px;
          flex: 1;
        "
        title="Ajustar escala del timeline"
      >
        <span
          class="material-icons"
          style="color: var(--text-sec); font-size: 20px"
          >zoom_out</span
        >
        <input
          type="range"
          id="zoomSlider"
          class="zoom-slider"
          min="100"
          max="600"
          value="200"
          oninput="updateZoom()"
        />
        <span
          class="material-icons"
          style="color: var(--text-sec); font-size: 20px"
          >zoom_in</span
        >
      </div>
    </div>

    <div class="planner-wrapper card">
      <div class="sidebar" id="sidebar"></div>
      <div class="timeline-container">
        <div id="timelineScrollArea" class="timeline-scroll">
          <div class="time-header" id="timeHeader"></div>
          <div id="rowsContainer"></div>
        </div>
      </div>
    </div>

    <div class="overlay" id="drawerOverlay" onclick="closeAllDrawers()"></div>

    <div class="side-drawer" id="editDrawer">
      <div class="drawer-header">
        <h3>Editar Evento</h3>
        <button
          class="btn-icon"
          onclick="closeAllDrawers()"
          style="border: none"
        >
          ✕
        </button>
      </div>
      <div class="drawer-content">
        <input type="hidden" id="editFlightInternalId" />
        <input type="hidden" id="editEventType" />

        <div class="control-group">
          <label id="editIdLabel">ID y Color</label>
          <div style="display: flex; gap: 10px">
            <input type="text" id="editFlightId" style="flex: 1" />
            <input type="color" id="editFlightColor" style="width: 50px" />
          </div>
        </div>

        <div class="control-group" id="editRouteContainer">
          <label>Ruta</label>
          <div style="display: flex; gap: 10px">
            <select id="editOrigin" style="flex: 1"></select>
            <span style="align-self: center">→</span>
            <select id="editDestination" style="flex: 1"></select>
          </div>
        </div>

        <div class="control-group">
          <label>Inicio</label>
          <div style="display: flex; gap: 10px">
            <input type="date" id="editDepDate" style="flex: 1" />
            <input type="time" id="editDepTime" style="flex: 1" />
          </div>
        </div>
        <div class="control-group">
          <label>Fin</label>
          <div style="display: flex; gap: 10px">
            <input type="date" id="editArrDate" style="flex: 1" />
            <input type="time" id="editArrTime" style="flex: 1" />
          </div>
        </div>
        <div class="control-group">
          <label>Stand Asignado</label>
          <select id="editStandSelect"></select>
        </div>
      </div>
      <div class="drawer-footer">
        <button
          class="btn-icon"
          onclick="deleteEventFromDrawer()"
          style="
            color: #ba1a1a;
            border: none;
            margin-right: auto;
            display: flex;
            align-items: center;
            justify-content: center;
          "
        >
          <span class="material-icons" style="font-size: 20px">delete</span>
        </button>
        <button
          class="btn-icon"
          onclick="closeAllDrawers()"
          style="border: none"
        >
          Cancelar
        </button>
        <button class="btn-primary" onclick="saveFlightEdit()">
          Guardar Cambios
        </button>
      </div>
    </div>

    <div class="side-drawer" id="editStandDrawer">
      <div class="drawer-header">
        <h3>Editar Stand</h3>
        <button
          class="btn-icon"
          onclick="closeAllDrawers()"
          style="border: none"
        >
          ✕
        </button>
      </div>
      <div class="drawer-content">
        <input type="hidden" id="editStandInternalId" />

        <div class="control-group">
          <label>Nombre del Stand (Avión)</label>
          <input type="text" id="editStandName" />
        </div>
        <div class="control-group">
          <label>Color</label>
          <input type="color" id="editStandColor" style="width: 50px" />
        </div>
      </div>
      <div class="drawer-footer">
        <button
          class="btn-icon"
          onclick="closeAllDrawers()"
          style="border: none"
        >
          Cancelar
        </button>
        <button class="btn-primary" onclick="saveStandEdit()">
          Guardar Cambios
        </button>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
  </body>
</html>
